services:
  app:
    build: .
    environment:
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_SECRET=${REFRESH_SECRET}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"  # ← HTTPS portu
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # ← SSL dosyalarını mount
    depends_on:
      - app

volumes:
  mongo_data:
  