events {
    worker_connections 1024;
}

http {
    upstream backend {
        server app:3000;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        return 301 https://$host$request_uri;   # 301 = Permanent Redirect** (kalıcı yönlendirme)
    }

    # HTTPS server
    server {
        listen 443 ssl;
        
        ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;    # Gerçek kullanıcı IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;    # Proxy zinciri
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}